name: Selenium Pytest Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true    # ✅ Node.js 24

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r SampleFramework/requirements.txt

      - name: Install Chrome
        uses: browser-actions/setup-chrome@latest   # ✅ updated

#      - name: Install Firefox        # ✅ Add Firefox
#        uses: browser-actions/setup-firefox@latest
#
#      - name: Install GeckoDriver    # ✅ Add GeckoDriver for Firefox
#        uses: browser-actions/setup-geckodriver@latest

      - name: Run Tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          BASE_URL: ${{ secrets.BASE_URL }}
          APP_USERNAME: ${{ secrets.APP_USERNAME }}    # ✅ renamed
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}    # ✅ renamed
          SHOP_URL: ${{ secrets.SHOP_URL }}

        run: |
#          pytest SampleFramework/test/test_e2etest.py -v -s --browser_name="firefox" \
#            --html=SampleFramework/reports/report.html \
#            --self-contained-html
          pytest -v -s --browser_name="chrome" \
            --html=SampleFramework/reports/report.html \
            --self-contained-html
      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: SampleFramework/reports/report.html
